# Example smoke test for the rfcx-local runner.
#
# Drop this file into ANY rfcx-org repo at .github/workflows/rfcx-local-smoke-test.yaml
# and trigger via workflow_dispatch to verify the runner end-to-end.
#
# Validates:
# - Runner picks up the job (org-level registration works)
# - Self-hosted runner has arm64 + Docker buildx
# - Runner can reach local registry 192.168.5.1:30500
# - Runner has kubectl access to apps-prod (read + write check)

name: 'rfcx-local runner smoke test'

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: rfcx-local-deployment-runner
    steps:
      - name: 'Identity'
        run: |
          echo "Hostname: $(hostname)"
          echo "User: $(whoami) uid=$(id -u)"
          echo "Arch: $(uname -m)"
          docker version --format 'Docker {{.Server.Version}}'

      - name: 'Local registry reachable?'
        run: |
          curl -s http://192.168.5.1:30500/v2/_catalog | head -c 200
          echo

      - name: 'kubectl access to apps-prod?'
        run: |
          kubectl -n apps-prod get deploy --no-headers | head
          echo
          kubectl -n apps-prod auth can-i create deployments
          kubectl -n apps-prod auth can-i update deployments
          kubectl -n apps-prod auth can-i delete deployments

      - name: 'Docker buildx push smoke'
        run: |
          mkdir -p /tmp/smoke
          cat > /tmp/smoke/Dockerfile <<'DOCKERFILE'
          FROM alpine:3.20
          RUN echo "hello from rfcx-local smoke test" > /msg
          CMD cat /msg
          DOCKERFILE
          docker buildx build \
            --platform linux/arm64 \
            --tag 192.168.5.1:30500/smoke:$(date +%s) \
            --output type=registry,registry.insecure=true \
            /tmp/smoke
